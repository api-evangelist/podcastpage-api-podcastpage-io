aid: podcastpage-api-podcastpage-io
name: Podcastpage
description: >-
  Podcastpage.io was a podcast website builder that provided programmatic access
  for managing podcast websites and content. The product is now operating under
  the Beamly brand (beamly.com) following a rebrand. As of this entry the
  service does not publish a public OpenAPI specification or open developer
  documentation, and integration support is provided through customer support
  and Help Center articles.
